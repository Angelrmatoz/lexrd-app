# ===================================================================
# DOCKER COMPOSE - DESARROLLO (SUPABASE CON BACKEND)
# ===================================================================
# Uso: docker compose -f docker-compose.dev.yml up -d
# Levanta backend conectado a Supabase
# Seeder: carga PDFs si no existen, muestra logs detallados
# ===================================================================

services:
  # ─────────────────────────────────────────────────
  # Backend Spring Boot (Conectado a Supabase)
  # ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lexrd_backend_dev
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      API_KEY_FILTER: ""
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
