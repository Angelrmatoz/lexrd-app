# ===================================================================
# PERFIL DATABASE (POSTGRESQL LOCAL CON DOCKER)
# ===================================================================
# Uso: ./mvnw spring-boot:run -Dspring-boot.run.profiles=database
# Requiere: docker compose -f docker-compose.db.yml up -d
# ===================================================================

# DATABASE - Configuración para PostgreSQL local vía Docker
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA/HIBERNATE - Debug mode
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# SEEDER - Activar carga de documentos en cada reinicio
app.seeder.enabled=true

# LOGGING - Detallado para desarrollo local
logging.level.com.lexrd.backend=DEBUG
logging.level.org.springframework.ai=DEBUG

# API KEY - Deshabilitada en desarrollo local
app.api.key=

# FRONTEND URL - Local
app.frontend.url=http://localhost:3000

# SWAGGER - Activado solo en desarrollo
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=com.lexrd.backend.controller
springdoc.swagger-ui.support-authorization-credentials=true
