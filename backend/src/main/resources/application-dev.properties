# ===================================================================
# PERFIL DE DESARROLLO (SUPABASE - CARGA DE PDFs Y LOGS)
# ===================================================================
# Uso: Perfil "dev" en IntelliJ o Docker
# Seeder: carga PDFs solo si no existen en Supabase
# Logs: muestra información esencial de la aplicación
# ===================================================================

# DATABASE - Supabase con Session Pooler (IPv4 compatible)
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/HIBERNATE - Modo desarrollo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN

# SEEDER - Activar: verifica si hay PDFs, si no, los carga
app.seeder.enabled=true

# LOGGING - Esencial para desarrollo
logging.level.com.lexrd.backend=DEBUG
logging.level.org.springframework.ai.vectorstore=WARN

# API KEY - Deshabilitada en desarrollo
app.api.key=

# FRONTEND URL - Local
app.frontend.url=http://localhost:3000

# SWAGGER - Activado para pruebas
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=com.lexrd.backend.controller
springdoc.swagger-ui.support-authorization-credentials=true
