# ===================================================================
# PERFIL DE DESARROLLO (SUPABASE - SUBIR PDFs Y LOGS DETALLADOS)
# ===================================================================

# DATABASE - Supabase con Session Pooler (IPv4 compatible)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/HIBERNATE - Debug mode
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# SEEDER - Activar para subir PDFs al knowledge base
app.seeder.enabled=true

# LOGGING - Esencial para desarrollo
logging.level.com.lexrd.backend=DEBUG
logging.level.org.springframework.ai.vectorstore=WARN

# API KEY - Deshabilitada en desarrollo
app.api.key=

# FRONTEND URL - Local
app.frontend.url=http://localhost:3000

# SWAGGER - Activado para pruebas
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=com.lexrd.backend.controller
springdoc.swagger-ui.support-authorization-credentials=true
