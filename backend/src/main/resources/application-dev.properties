# ===================================================================
# CONFIGURACIÓN DE DESARROLLO (PC LOCAL)
# ===================================================================

# Database - Usando variables de entorno configuradas en el IDE
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate - Ver las consultas SQL en la consola (Modo Desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Seeder - Activar la carga automática de documentos en cada reinicio
app.seeder.enabled=true

# Logging detallado para tu código
logging.level.com.lexrd.backend=DEBUG

# Spring AI - Logs de las peticiones a Google GenAI
logging.level.org.springframework.ai=DEBUG

# API Key vacía en desarrollo = filtro deshabilitado
app.api.key=

# Swagger / OpenAPI Configuration (Solo desarrollo)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=com.lexrd.backend.controller
springdoc.swagger-ui.support-authorization-credentials=true
