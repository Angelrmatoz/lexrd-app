# ===================================================================
# PERFIL DE PRODUCCIÓN (SUPABASE + AZURE CONTAINER APPS)
# ===================================================================

# DATABASE - Supabase PostgreSQL
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARICP - Pool de conexiones optimizado
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA/HIBERNATE - Producción
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# SEEDER - Desactivado en producción
app.seeder.enabled=false

# API KEY - Obligatoria en producción
app.api.key=${API_KEY_FILTER}

# FRONTEND URL - Producción
app.frontend.url=${FRONTEND_URL}

# SWAGGER - Desactivado en producción
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# LOGGING - Mínimo para producción
logging.level.root=WARN
logging.level.com.lexrd.backend=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN
logging.level.com.zaxxer.hikari=WARN

# INICIALIZACIÓN PEREZOSA (LAZY) - Optimiza arranque y memoria
spring.main.lazy-initialization=true
