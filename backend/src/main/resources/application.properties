spring.application.name=backend

# OpenRouter Model's

ai.model.primary=nvidia/nemotron-3-super-120b-a12b:free
ai.model.fallback1=qwen/qwen3-next-80b-a3b-instruct:free
ai.model.fallback2=openai/gpt-oss-120b:free

# Database Configuration (Supabase)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/lexrd_backend}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
# Apagar los logs SQL por defecto (se pueden ver si activas el nivel DEBUG)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Spring AI - OpenRouter Configuration
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.chat.options.model=${ai.model.primary}
spring.ai.openai.embedding.enabled=false

# Local Transformers (ONNX) Embedding Configuration
# Configuración forzada en EmbeddingConfig.java para usar MPNet (768D)
# y evitar el bug de Spring AI 2.0.0-M3 que usa MiniLM (384D) por defecto.

# Vector Store - PGVector Configuration
# IMPORTANT: initialize-schema=true creates the table automatically on first run
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
# Gemini gemini-embedding-001 with Matryoshka dimensionality reduction (768D)
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.table-name=vector_store

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# Tomcat configuration
server.tomcat.basedir=./target/tomcat-temp
server.port=5000

# Seeder Configuration
app.seeder.enabled=true

# ===================================================================
# LOGGING CONFIGURATION (Cleaner Console)
# ===================================================================
# Nivel base por defecto (WARN oculta la mayoría de la basura, INFO muestra lo normal)
logging.level.root=WARN
# Mantener INFO para tu propia aplicación para que puedas ver tus logs
logging.level.com.lexrd.backend=INFO

# Silenciar a HikariCP (Connection Pool)
logging.level.com.zaxxer.hikari=WARN
# Silenciar a Tomcat (Servidor Web)
logging.level.org.apache.catalina=WARN
logging.level.org.apache.coyote=WARN
logging.level.org.apache.tomcat=WARN
# Silenciar a Hibernate/JPA
logging.level.org.hibernate=WARN
# Si en algún momento necesitas ver el SQL, cambia esto a DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
# Silenciar a Spring Framework (Core, Web, AI)
logging.level.org.springframework=WARN
logging.level.org.springframework.ai=WARN
