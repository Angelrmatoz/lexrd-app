spring.application.name=backend

# ==============================================================
# GEMINI MODELS (Shared across profiles)
# ==============================================================
ai.model.primary=gemini-3.1-flash-lite-preview
ai.model.fallback1=gemini-2.5-flash-lite
ai.model.fallback2=gemini-2.0-flash-lite
ai.model.fallback3=gemma-4-31b-it

# ==============================================================
# SPRING AI - OPENAI TO GEMINI BRIDGE CONFIGURATION
# ==============================================================
spring.ai.openai.api-key=${GEMINI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.options.model=${ai.model.primary}
spring.ai.openai.chat.options.temperature=0.0
spring.ai.openai.embedding.enabled=false

# SPRING AI RETRY - Desactivado para que FallbackChatModel controle los reintentos
spring.ai.retry.max-attempts=1
spring.ai.retry.multiplier=1
spring.ai.retry.initial-interval=1000
spring.ai.retry.max-interval=2000

# VECTOR STORE - PGVECTOR CONFIGURATION
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.table-name=vector_store

# ASYNC CONFIGURATION
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# TOMCAT CONFIGURATION
server.port=4000
server.tomcat.basedir=./target/tomcat-temp

# API KEY FILTER (definido en cada perfil)
app.api.key=${API_KEY_FILTER}

# FRONTEND URL (definido en cada perfil)
app.frontend.url=${FRONTEND_URL}