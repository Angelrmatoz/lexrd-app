spring.application.name=backend

# OpenRouter Model's

ai.model.primary=qwen/qwen3-next-80b:free
ai.model.fallback1=meta-llama/llama-3.3-70b:free
ai.model.fallback2=openai/gpt-oss-120b:free

# Database Configuration (Supabase)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lexrd_backend}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Spring AI - OpenRouter Configuration
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.options.model=${ai.model.primary}
spring.ai.openai.embedding.enabled=false

# Gemini Embeddings Configuration (Primary for LexRD)
# Model: text-embedding-004 (Google AI Studio / GenAI)
# Free tier: 1000 RPM, 1M TPM
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.project-id=${GEMINI_PROJECT_ID:lexrd-app}
spring.ai.google.genai.location=${GEMINI_LOCATION:us-central1}
spring.ai.google.genai.embedding.options.model=text-embedding-004
# Note: Google GenAI starter uses slightly different property names in some versions.
# We set the default task type for document indexing.
spring.ai.google.genai.embedding.options.taskType=RETRIEVAL_DOCUMENT

# Vector Store - Local Configuration (Precedence over PGVector)
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.table-name=vector_store

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# Tomcat configuration
server.tomcat.basedir=${user.home}/.lexrd-tomcat
