spring.application.name=backend

# ==============================================================
# TITLE Gemini Models (Shared across profiles)
# ==============================================================
ai.model.primary=gemini-3.1-flash-lite-preview
ai.model.fallback1=gemini-2.5-flash-lite
ai.model.fallback2=gemini-2.0-flash-lite
ai.model.fallback3=gemma-4-31b-it


# ==============================================================
# TITLE Spring AI - OpenAI to Gemini Bridge Configuration
# ==============================================================
spring.ai.openai.api-key=${GEMINI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.options.model=${ai.model.primary}
spring.ai.openai.chat.options.temperature=0.0
spring.ai.openai.embedding.enabled=false

# Vector Store - PGVector Configuration
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.table-name=vector_store

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# Tomcat configuration
server.port=5000
server.tomcat.basedir=./target/tomcat-temp

# Default Seeder (Disabled in base/production)
app.seeder.enabled=false

# ===================================================================
# LOGGING CONFIGURATION (Baseline)
# ===================================================================
logging.level.root=INFO
logging.level.com.lexrd.backend=INFO

# Silence noisier libraries
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN