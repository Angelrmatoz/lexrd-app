spring.application.name=backend

# OpenRouter Model's

ai.model.primary=qwen/qwen3-next-80b:free
ai.model.fallback1=meta-llama/llama-3.3-70b:free
ai.model.fallback2=openai/gpt-oss-120b:free

# Database Configuration (Supabase)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:lexrd_backend}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Spring AI - OpenRouter Configuration
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.options.model=${ai.model.primary}
spring.ai.openai.embedding.enabled=false

# Gemini Embeddings Configuration (Primary for LexRD)
# Model: text-embedding-004 (Google AI Studio / GenAI)
# Free tier: 1000 RPM, 1M TPM
# IMPORTANT: Spring AI 2.0.0-M3 uses the `.text.options` sub-namespace for the Google GenAI text embedding model.
# Using the wrong namespace causes Spring AI to default to gemini-embedding-1.0 (3072D), causing a dimension mismatch.
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.vertex-ai=false
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.embedding.vertex-ai=false
spring.ai.google.genai.embedding.text.options.model=text-embedding-004
spring.ai.google.genai.embedding.text.options.task-type=RETRIEVAL_DOCUMENT

# Vector Store - PGVector Configuration
# IMPORTANT: initialize-schema=true creates the table automatically on first run
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
# Gemini text-embedding-004 produces 768-dimensional vectors (NOT 1536 which is OpenAI)
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.table-name=vector_store

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# Tomcat configuration
server.tomcat.basedir=./target/tomcat-temp
server.port=4000

# Seeder Configuration
app.seeder.enabled=true
