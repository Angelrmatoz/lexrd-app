spring.application.name=backend

# OpenRouter Models (Shared across profiles)
ai.model.primary=nvidia/nemotron-3-super-120b-a12b:free
ai.model.fallback1=meta-llama/llama-3.1-8b-instruct:free
ai.model.fallback2=google/gemma-2-9b-it:free

# Database Configuration (Base - Requires environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Baseline (Safe for Production)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Spring AI - OpenRouter Configuration
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.chat.options.model=${ai.model.primary}
spring.ai.openai.embedding.enabled=false

# Vector Store - PGVector Configuration
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.table-name=vector_store

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# Tomcat configuration
server.port=5000
server.tomcat.basedir=./target/tomcat-temp

# Default Seeder (Disabled in base/production)
app.seeder.enabled=false

# ===================================================================
# LOGGING CONFIGURATION (Baseline)
# ===================================================================
logging.level.root=INFO
logging.level.com.lexrd.backend=INFO

# Silence noisier libraries
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN
