# ===================================================================
# DOCKER COMPOSE - PRODUCCIÓN (AZURE CONTAINER APPS)
# ===================================================================
# Uso: Este archivo es la referencia para desplegar en Azure.
# En Azure Container Apps se configura directamente en el portal/CLI.
# Para pruebas locales de prod: docker compose up -d
# ===================================================================

services:
  # ─────────────────────────────────────────────────
  # Backend Spring Boot (Conectado a Supabase)
  # ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${CONTAINER_REGISTRY:-lexrd}/backend:${IMAGE_TAG:-latest}
    container_name: lexrd_backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      API_KEY_FILTER: ${API_KEY_FILTER:-}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
