# ===================================================================
# DOCKER COMPOSE - LOCAL (POSTGRESQL + BACKEND)
# ===================================================================
# Uso: docker compose -f docker-compose.local.yml up -d
# Levanta PostgreSQL local y backend Spring Boot
# ===================================================================

services:
  # ─────────────────────────────────────────────────
  # PostgreSQL 17 + pgvector (extensión vectorial)
  # Imagen oficial: https://hub.docker.com/r/pgvector/pgvector
  # ─────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg17
    container_name: lexrd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexrd_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1834569}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lexrd_backend"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────
  # Backend Spring Boot (Conectado a PostgreSQL local)
  # Con HOT RELOAD: monta el código fuente del host
  # ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: lexrd_backend_local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: lexrd_backend
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-1834569}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      API_KEY_FILTER: ""
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      # Montar código fuente para hot reload
      - ./src:/app/src:cached
      - ./pom.xml:/app/pom.xml:cached
      # Excluir target para evitar conflictos
      - /app/target
      - /root/.m2

volumes:
  pgdata:
    name: lexrd_pgdata
